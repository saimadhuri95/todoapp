name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Analyze & verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test integration_test tool
      - run: flutter analyze
      - name: Phase 0 unit suites
        run: >
          flutter test
          test/core/hlc_test.dart
          test/data/repositories_test.dart
          test/core/recurrence_test.dart
          test/data/lww_applier_test.dart
          test/data/sync_engine_test.dart
      - name: Convergence and simulator gate
        run: >
          flutter test
          test/data/convergence_test.dart
          test/data/sync_simulator_test.dart
      - name: Full suite with coverage
        run: flutter test --coverage
      - name: Coverage floor (lib/data, generated code excluded)
        run: >
          dart tool/check_coverage.dart
          --lcov coverage/lcov.info
          --min 80
          --scope lib/data
      - name: DST correctness suite (needs a DST-observing zone)
        run: TZ=America/New_York flutter test test/core/dst_test.dart

  smoke-desktop:
    name: Smoke ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            command: xvfb-run -a flutter test integration_test/app_smoke_test.dart -d linux
          - os: windows-latest
            target: windows
            command: flutter test integration_test/app_smoke_test.dart -d windows
          - os: macos-26
            target: macos
            command: flutter test integration_test/app_smoke_test.dart -d macos
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev libkeybinder-3.0-dev libayatana-appindicator3-dev xvfb
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: ${{ matrix.command }}

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            build-cmd: flutter build linux --debug
          - os: ubuntu-latest
            target: android
            build-cmd: flutter build apk --debug
          - os: windows-latest
            target: windows
            build-cmd: flutter build windows --debug
          - os: macos-26
            target: macos
            build-cmd: flutter build macos --debug || flutter build macos --debug
          - os: macos-26
            target: ios
            build-cmd: flutter build ios --debug --no-codesign
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev libkeybinder-3.0-dev libayatana-appindicator3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: ${{ matrix.build-cmd }}
