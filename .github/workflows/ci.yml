name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
      - name: DST correctness suite (needs a DST-observing zone)
        run: TZ=America/New_York flutter test test/core/dst_test.dart

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            build-cmd: flutter build linux --debug
          - os: ubuntu-latest
            target: android
            build-cmd: flutter build apk --debug
          - os: windows-latest
            target: windows
            build-cmd: flutter build windows --debug
          - os: macos-latest
            target: macos
            build-cmd: flutter build macos --debug
          - os: macos-latest
            target: ios
            build-cmd: flutter build ios --debug --no-codesign
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: ${{ matrix.build-cmd }}
