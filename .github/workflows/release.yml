name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify:
    name: Release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Convergence property gate
        run: >
          flutter test
          test/data/convergence_test.dart
          test/data/sync_simulator_test.dart
      - name: DST correctness suite
        run: TZ=America/New_York flutter test test/core/dst_test.dart

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: android
          - os: windows-latest
            target: windows
          - os: macos-26
            target: macos
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev libkeybinder-3.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          tar czf knot-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: Build Android APK (debug-signed, sideload only)
        if: matrix.target == 'android'
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk knot-android.apk
      - name: Build Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          flutter build windows --release
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath knot-windows-x64.zip
      - name: Build macOS (unsigned)
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          ditto -c -k --keepParent build/macos/Build/Products/Release/Knot.app knot-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: knot-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: knot-*
